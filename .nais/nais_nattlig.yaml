apiVersion: nais.io/v1
kind: Naisjob
metadata:
  labels:
    team: pia
  name: pia-jobbsender-{{ JOBB_NAVN_NAISVENNLIG }}
  namespace: pia
spec:
  image: {{ image }}
  schedule: "1 0 * * *" # kjør nattlig
  timeZone: "UTC"
  kafka:
    pool: {{ kafkaPool }}
  observability:
    autoInstrumentation:
      enabled: true
      runtime: java
      destinations:
        - id: "grafana-lgtm"
    logging:
      destinations:
        - id: elastic
        - id: loki
  env:
    - name: JOBB
      value: {{ JOBB }}
    - name: JOBBLYTTER_TOPIC
      value: pia.jobblytter-v1
    - name: KAFKA_CLIENT_ID
      value: pia-jobbsender-nattlig