name: Bygg image og push til GAR
on:
  push:
    branches:
      - main


permissions: {}

jobs:
  build:
    permissions:
      contents: write
      id-token: write
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - uses: gradle/actions/setup-gradle@v6.1.0
        with:
          dependency-graph: generate-and-submit
      - name: Compile, run tests and build
        run: ./gradlew test installDist
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: linux/amd64,linux/arm64
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and push docker image
        uses: nais/docker-build-push@v0
        id: docker-push
        with:
          team: pia
          tag: ${{ github.ref == 'refs/heads/main' && 'latest' || 'branch_latest' }}
    outputs:
      image: ${{ steps.docker-push.outputs.image }}

  deploy-oppdater-view:
    needs: build
    strategy:
      matrix:
        cluster: [dev, prod]
    permissions:
      id-token: write
    name: Deployer nattlig view-oppdatering til ${{ matrix.cluster }}-gcp
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Deploy application to ${{ matrix.cluster }}-gcp
        uses: nais/deploy/actions/deploy@v2
        env:
          IMAGE: ${{ needs.build.outputs.image }}
          CLUSTER: ${{ matrix.cluster }}-gcp
          RESOURCE: .nais/nais_nattlig.yaml
          VARS: .nais/${{ matrix.cluster }}-gcp.yaml
          VAR: JOBB=materializedViewOppdatering,JOBB_NAVN_NAISVENNLIG=oppdater-view

  deploy-rydde-urorte-saker:
    needs: build
    strategy:
      matrix:
        cluster: [dev, prod]
    permissions:
      id-token: write
    name: Deployer nattlig ryddejobb til ${{ matrix.cluster }}-gcp
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Deploy application to ${{ matrix.cluster }}-gcp
        uses: nais/deploy/actions/deploy@v2
        env:
          IMAGE: ${{ needs.build.outputs.image }}
          CLUSTER: ${{ matrix.cluster }}-gcp
          RESOURCE: .nais/nais_nattlig.yaml
          VARS: .nais/${{ matrix.cluster }}-gcp.yaml
          VAR: JOBB=ryddeIUrørteSaker,JOBB_NAVN_NAISVENNLIG=rydde-urorte-saker

  deploy-prosesser-planlagte-hendelser:
    needs: build
    strategy:
      matrix:
        cluster: [dev, prod]
    permissions:
      id-token: write
    name: Deployer nattlig prosessering av planlagte hendelser til ${{ matrix.cluster }}-gcp
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Deploy application to ${{ matrix.cluster }}-gcp
        uses: nais/deploy/actions/deploy@v2
        env:
          IMAGE: ${{ needs.build.outputs.image }}
          CLUSTER: ${{ matrix.cluster }}-gcp
          RESOURCE: .nais/nais_nattlig.yaml
          VARS: .nais/${{ matrix.cluster }}-gcp.yaml
          VAR: JOBB=prosesserPlanlagteHendelser,JOBB_NAVN_NAISVENNLIG=prosesser-planlagte-hendelser

  deploy-sjekk-publiseringsdato:
    needs: build
    strategy:
      matrix:
        cluster: [dev]
    permissions:
      id-token: write
    name: Deployer daglig publiseringsdato-sjekk til ${{ matrix.cluster }}-gcp
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Deploy application to ${{ matrix.cluster }}-gcp
        uses: nais/deploy/actions/deploy@v2
        env:
          IMAGE: ${{ needs.build.outputs.image }}
          CLUSTER: ${{ matrix.cluster }}-gcp
          RESOURCE: .nais/nais_daglig.yaml
          VARS: .nais/${{ matrix.cluster }}-gcp.yaml
          VAR: JOBB=sjekkPubliseringsdatoOgImporter,JOBB_NAVN_NAISVENNLIG=sjekk-publiseringsdato,SCHEDULE=0 6 * * *


  deploy-publiseringsdato-dvh-import:
    needs: build
    strategy:
      matrix:
        cluster: [dev]
    permissions:
      id-token: write
    name: Deployer daglig publiseringsdato-import til ${{ matrix.cluster }}-gcp
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Deploy application to ${{ matrix.cluster }}-gcp
        uses: nais/deploy/actions/deploy@v2
        env:
          IMAGE: ${{ needs.build.outputs.image }}
          CLUSTER: ${{ matrix.cluster }}-gcp
          RESOURCE: .nais/nais_daglig.yaml
          VARS: .nais/${{ matrix.cluster }}-gcp.yaml
          VAR: JOBB=publiseringsdatoDvhImport,JOBB_NAVN_NAISVENNLIG=publiseringsdato-dvh-import,SCHEDULE=0 19 * * *


  trivy-scan:
    name: Scanner docker image med Trivy
    if: github.ref == 'refs/heads/main'
    needs: build
    permissions:
      contents: read # to write sarif
      security-events: write # push sarif to github security
      id-token: write # for nais/login
    runs-on: ubuntu-latest
    steps:
      - uses: navikt/pia-actions/trivy-scan@b8ec125fe3d75ffdbf958c3546ba0aeafa689be0 # v1.1.13
        with:
          image: ${{ needs.build.outputs.image }}
          team: pia
          upload-artifact: true
